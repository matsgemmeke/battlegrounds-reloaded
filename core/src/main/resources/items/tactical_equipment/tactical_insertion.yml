name: Tactical Insertion
equipment-type: TACTICAL
description: Marks a location as your next spawn point.
controls:
  throwing:
    action: LEFT_CLICK
    blocking: true
    cancels-event: true
deploy:
  health: 50.0
  triggers:
    scheduled:
      type: SCHEDULED
      offset-delays: [ 1 ]
  on-destruction:
    activate-effect: false
    remove-deployment: true
    undo-effect: false
    particle-effect:
      particle: BLOCK_CRACK
      count: 5
      offset-x: 0.25
      offset-y: 0.25
      offset-z: 0.25
      extra: 0.0
      block-data: REDSTONE_TORCH
  on-reset:
    remove-deployment: false
  throwing:
    cooldown: 30
    throw-sounds: ENTITY_ARROW_SHOOT-1-0.5-0
    velocity: 0.0
effect:
  type: MARK_SPAWN_POINT
items:
  display-item:
    material: SHEARS
    display-name: '&f%name%'
    damage: 11
    item-flags:
      - HIDE_ATTRIBUTES
      - HIDE_UNBREAKABLE
    data:
      weapon-type:
        key: weapon-type
        type: STRING
        value: EQUIPMENT
      weapon-name:
        key: weapon-name
        type: STRING
        value: Tactical Insertion
    unbreakable: true
  throw-item:
    material: SHEARS
    display-name: '&f%name%'
    damage: 11
