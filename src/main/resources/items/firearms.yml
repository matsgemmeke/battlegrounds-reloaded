# Gun format
# <ID>:
#   accuracy: Represents how accurate the firearm fires onto the proposed target
#   ammo:
#     magazine: Magazine size
#     max: Maximum amount of magazines the player can carry
#     supply: Starting supply of magazines the player gets
#   description: Description of the firearm
#   display-name: The name of the firearm
#   firearm-type: ASSAULT_RIFLE, HANDGUN, LIGHT_MACHINE_GUN, SHOTGUN, SNIPER_RIFLE, SUBMACHINE_GUN
#   firing-mode:
#     burst: Amount of rounds fired with a single pull on the trigger. This option only affects firearms using burst fire
#     cooldown: The amount of ticks the firearm needs to wait to be able to shoot again
#     rate-of-fire: Amount of rounds fired per minute. Semi-automatic firearms always fire only one projectile at a time
#     type: BURST_MODE, FULLY_AUTOMATIC, SEMI_AUTOMATIC
#   headshot-damage-multiplier: Damage multiplier when the projectile hits a player in the head.
#   item:
#     durability: The item durability
#     material: The item material
#   level-unlocked: The player level at which they will have unlocked the firearm
#   price: The price of the firearm
#   range:
#     long-range:
#       damage: Long-range damage
#       distance: Distance where the long range ends and the projectile gets removed
#     medium-range:
#       damage: Medium-range damage
#       distance: Distance where the medium range ends and long range starts
#     short-range:
#       damage: Short-range damage
#       distance: Distance where the short range ends and medium range starts
#   reload:
#     duration: Reload time in ticks
#     feed-system: MAGAZINE, PER_ROUND
#   sound:
#     reload-sound: Array of sounds which play when adding ammo or replacing the magazine of the firearm
#     shot-sound: Array of sounds which play when the firearm shoots
#     shot-suppressed-sound: Array of sounds which play when the firearm shoots with a suppressor attached
#
# Explosive launcher format
# <ID>:
#   accuracy: Represents how accurate the firearm fires onto the proposed target
#   ammo:
#     magazine: Magazine size
#     max: Maximum amount of magazines the player can carry
#     supply: Starting supply of magazines the player gets
#   description: Description of the firearm
#   display-name: The name of the firearm
#   item:
#     durability: The item durability
#     material: The item material
#   level-unlocked: The player level at which they will have unlocked the firearm
#   price: The price of the firearm
#   projectile:
#     material: Launcher projectile material
#     type: EXPLOSIVE_BOLT, GRENADE, ROCKET
#     velocity: Launcher projectile travel speed
#   range:
#     long-range:
#       damage: Long-range damage
#       distance: Distance where the long range ends and the projectile gets removed
#     medium-range:
#       damage: Medium-range damage
#       distance: Distance where the medium range ends and long range starts
#     short-range:
#       damage: Short-range damage
#       distance: Distance where the short range ends and medium range starts
#   reload:
#     duration: Reload time in ticks.
#     feed-system: MAGAZINE, PER_ROUND
#   sound:
#     reload-sound: Array of sounds which play when adding ammo or replacing the magazine of the firearm
#     shot-sound: Array of sounds which play when the firearm shoots

